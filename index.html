<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Payhug 유효성 검사 UI</title>
<link rel="stylesheet" href="_ds/payhug-design-system-81d4f219-9751-4714-b38a-af7827ee8f91/tokens/fonts.css">
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; background: #EEF0F2; min-height: 100vh;
    font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    color: #191919; display: flex; justify-content: center;
  }
  .wrap { width: 460px; max-width: 100%; padding: 40px 24px 64px; }
  .logo { height: 26px; display: block; }
  h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.02em; margin: 28px 0 6px; }
  .sub { font-size: 14px; color: #7E8299; margin: 0 0 28px; line-height: 1.5; }
  .group { margin-top: 28px; }
  .group-title { font-size: 13px; font-weight: 700; color: #434548; margin: 0 0 6px; letter-spacing: 0.02em; }
  .group-desc { font-size: 12.5px; color: #9296AC; margin: 0 0 14px; line-height: 1.5; }
  .card {
    display: flex; align-items: center; gap: 14px;
    background: #FFFFFF; border: 1px solid #EDEFF2; border-radius: 14px;
    padding: 16px 18px; text-decoration: none; color: inherit;
    margin-bottom: 10px; transition: box-shadow .15s cubic-bezier(.2,.8,.2,1), transform .15s cubic-bezier(.2,.8,.2,1), border-color .15s;
  }
  .card:hover { box-shadow: 0 6px 20px rgba(0,0,0,0.07); transform: translateY(-1px); border-color: #DFE7D6; }
  .badge {
    flex-shrink: 0; width: 40px; height: 40px; border-radius: 10px;
    background: #F2FAEC; color: #163300; display: flex; align-items: center; justify-content: center;
  }
  .badge.new { background: #163300; color: #9FE870; }
  .card-body { flex: 1; min-width: 0; }
  .card-title { display: block; font-size: 15.5px; font-weight: 600; }
  .card-sub { display: block; font-size: 12.5px; color: #7E8299; margin-top: 3px; }
  .chev { flex-shrink: 0; color: #C7CAD6; }
  .divider { height: 1px; background: #E3E6EA; margin: 34px 0 0; border: none; }
  .foot { margin-top: 28px; text-align: center; font-size: 12px; color: #A6AABB; }
</style>
</head>
<body>
  <div class="wrap">
    <img class="logo" src="assets/payhug-logo.png" alt="Payhug">

      <a class="card" href="new로그인.dc.html">
        <span class="badge new">1</span>
        <span class="card-body"><span class="card-title">로그인</span><span class="card-sub">오류 시에만 인라인 문구</span></span>
        <svg class="chev" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"></path></svg>
      </a>
      <a class="card" href="new회원가입.dc.html">
        <span class="badge new">2</span>
        <span class="card-body"><span class="card-title">회원가입</span><span class="card-sub">실시간 조건 체크</span></span>
        <svg class="chev" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"></path></svg>
      </a>
      <a class="card" href="new비밀번호재설정.dc.html">
        <span class="badge new">3</span>
        <span class="card-body"><span class="card-title">비밀번호 재설정</span><span class="card-sub">새 비밀번호 + 확인 필드 일치 검증</span></span>
        <svg class="chev" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"></path></svg>
      </a>
    </div>

      <a class="card" href="로그인.dc.html">

        <svg class="chev" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"></path></svg>
      </a>
      <a class="card" href="회원가입.dc.html">
        <span class="badge">2</span>
        <span class="card-body"><span class="card-title">회원가입</span><span class="card-sub">6개 조건 실시간 체크</span></span>
        <svg class="chev" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"></path></svg>
      </a>
      <a class="card" href="비밀번호재설정.dc.html">
        <span class="badge">3</span>
        <span class="card-body"><span class="card-title">비밀번호 재설정</span><span class="card-sub">조건 체크 + 확인 필드 일치</span></span>
        <svg class="chev" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"></path></svg>
      </a>
    </div>
    -->

    <p class="foot">©주식회사 페이허그</p>
  </div>

</html>
