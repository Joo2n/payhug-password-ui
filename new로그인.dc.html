<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="_ds/payhug-design-system-81d4f219-9751-4714-b38a-af7827ee8f91/tokens/fonts.css">
  <link rel="stylesheet" href="_ds/payhug-design-system-81d4f219-9751-4714-b38a-af7827ee8f91/tokens/colors.css">
  <link rel="stylesheet" href="_ds/payhug-design-system-81d4f219-9751-4714-b38a-af7827ee8f91/tokens/typography.css">
  <link rel="stylesheet" href="_ds/payhug-design-system-81d4f219-9751-4714-b38a-af7827ee8f91/tokens/spacing.css">
  <link rel="stylesheet" href="_ds/payhug-design-system-81d4f219-9751-4714-b38a-af7827ee8f91/styles.css">
  <script src="_ds/payhug-design-system-81d4f219-9751-4714-b38a-af7827ee8f91/_ds_bundle.js"></script>
  <style>
    html, body { margin: 0; padding: 0; background: #FAF9FA; }
    * { box-sizing: border-box; }
    input::placeholder { color: #A0A4B8; }
    @keyframes phShake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(5px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(2px); }
    }
    .ph-shake { animation: phShake 0.38s cubic-bezier(.36,.07,.19,.97); }
  </style>
</helmet>
<div style="min-height:100vh;display:flex;flex-direction:column;background:#FAF9FA;font-family:'Noto Sans KR',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
  <header style="height:64px;flex-shrink:0;background:#FFFFFF;border-bottom:1px solid #F0F0F0;display:flex;align-items:center;padding:0 30px;">
    <img src="assets/payhug-logo.png" alt="Payhug" style="height:28px;width:auto;display:block;" />
  </header>

  <main style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:60px 16px;">
    <div style="width:400px;max-width:100%;border-radius:20px;background:#FFFFFF;box-shadow:0px 1px 20px 0px rgba(0,0,0,0.15);padding:32px;display:flex;flex-direction:column;">
      <h1 style="margin:0;font-size:28px;font-weight:700;line-height:1.1;color:#000000;letter-spacing:-0.02em;">사장님 로그인</h1>

      <div style="margin-top:34px;">
        <div class="{{ idWrapClass }}" style="{{ idFieldStyle }}">
          <input type="text" inputmode="numeric" value="{{ loginId }}" onChange="{{ onId }}" onFocus="{{ onIdFocus }}" onBlur="{{ onIdBlur }}" placeholder="사업자등록번호 또는 휴대전화번호" style="flex:1;min-width:0;border:none;outline:none;background:transparent;font-family:inherit;font-size:16px;color:#191919;padding:0;" />
        </div>
        <sc-if value="{{ showIdError }}" hint-placeholder-val="{{ false }}">
          <p style="margin:7px 2px 0;font-size:13px;line-height:1.4;color:#FF383C;">{{ idErrorMsg }}</p>
        </sc-if>
      </div>

      <div style="margin-top:12px;">
        <div class="{{ pwWrapClass }}" style="{{ pwFieldStyle }}">
          <input type="{{ pwType }}" value="{{ pw }}" onChange="{{ onPw }}" onFocus="{{ onPwFocus }}" onBlur="{{ onPwBlur }}" placeholder="영문, 숫자, 특수문자 포함 8~16자" autoComplete="current-password" style="flex:1;min-width:0;border:none;outline:none;background:transparent;font-family:inherit;font-size:16px;color:#191919;padding:0;" />
          <button type="button" onClick="{{ togglePw }}" aria-label="비밀번호 표시 전환" style="flex-shrink:0;width:24px;height:24px;padding:0;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#9296AC;">
            <sc-if value="{{ showPw }}" hint-placeholder-val="{{ false }}">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.6-7 10-7 10 7 10 7-3.6 7-10 7-10-7-10-7z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </sc-if>
            <sc-if value="{{ hidePw }}" hint-placeholder-val="{{ true }}">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3l18 18"></path><path d="M10.6 10.6a2 2 0 002.8 2.8"></path><path d="M9.4 5.2A9.5 9.5 0 0112 5c5 0 9 4.5 9 7a12 12 0 01-2.2 3.1M6.3 6.3A12.4 12.4 0 003 12c0 2.5 4 7 9 7a9.4 9.4 0 004-.9"></path></svg>
            </sc-if>
          </button>
        </div>
        <sc-if value="{{ showPwError }}" hint-placeholder-val="{{ false }}">
          <p style="margin:7px 2px 0;font-size:13px;line-height:1.4;color:#FF383C;">{{ pwErrorMsg }}</p>
        </sc-if>
      </div>

      <button type="button" onClick="{{ onLogin }}" style="{{ loginBtnStyle }}">로그인</button>

      <a href="new회원가입.dc.html" style="margin-top:16px;height:53px;border-radius:12px;background:#FFFFFF;border:1px solid #163300;font-size:17.6px;font-weight:500;color:#163300;text-decoration:none;display:flex;align-items:center;justify-content:center;">회원가입</a>

      <div style="margin-top:24px;display:flex;justify-content:center;">
        <a href="new비밀번호찾기.dc.html" style="font-size:16px;font-weight:500;color:#7E8299;text-decoration:none;">비밀번호 찾기</a>
      </div>
    </div>

    <div style="margin-top:32px;display:flex;justify-content:center;">
      <span style="font-size:13px;font-weight:500;color:#7E8299;">©주식회사 페이허그</span>
    </div>
  </main>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1240,&quot;height&quot;:753}}">
class Component extends DCLogic {
  state = {
    loginId: "", pw: "",
    showPw: false,
    idFocused: false, pwFocused: false,
    idTouched: false, pwTouched: false,
    idShake: false, pwShake: false,
    spaceError: false,
  };

  ALLOWED = "!@#$%^&*()";
  SPECIAL_HELP = "사용 가능한 특수문자: ! @ # $ % ^ & * ( )";

  stripHangul(v) { return (v || "").replace(/[\u1100-\u11FF\u3130-\u318F\uA960-\uA97F\uAC00-\uD7A3]/g, ""); }
  flagSpace(raw) { if (/\s/.test(raw)) { this.setState({ spaceError: true }); clearTimeout(this._sp); this._sp = setTimeout(() => this.setState({ spaceError: false }), 2200); } }

  validBiz(d) {
    if (d.length !== 10) return false;
    const w = [1, 3, 7, 1, 3, 7, 1, 3, 5];
    let s = 0;
    for (let i = 0; i < 9; i++) s += w[i] * Number(d[i]);
    s += Math.floor((w[8] * Number(d[8])) / 10);
    return ((10 - (s % 10)) % 10) === Number(d[9]);
  }
  idError(v) {
    const raw = (v || "").trim();
    if (raw === "") return "사업자등록번호 또는 휴대전화번호를 입력해주세요.";
    const d = raw.replace(/\D/g, "");
    if (/^01/.test(d)) {
      if (d.length >= 10 && d.length <= 11) return "";
      return "올바른 휴대전화번호 형식이 아닙니다.";
    }
    if (d.length === 10 && this.validBiz(d)) return "";
    return "올바른 사업자등록번호 형식이 아닙니다.";
  }

  hasSpace(pw) { return /\s/.test(pw); }
  hasSpecial(pw) { for (const ch of pw) if (this.ALLOWED.includes(ch)) return true; return false; }
  hasDisallowed(pw) {
    for (const ch of pw) {
      if (/[A-Za-z0-9]/.test(ch)) continue;
      if (/\s/.test(ch)) continue;
      if (!this.ALLOWED.includes(ch)) return true;
    }
    return false;
  }
  // NEW 정책: 8~16자, 영문·숫자·특수문자 모두 필수 (반복·연속 규칙 미적용)
  pwValid(pw) {
    return pw.length >= 8 && pw.length <= 16
      && /[A-Za-z]/.test(pw) && /[0-9]/.test(pw) && this.hasSpecial(pw)
      && !this.hasSpace(pw) && !this.hasDisallowed(pw);
  }
  pwError(pw) {
    if (pw === "") return "비밀번호를 입력해주세요.";
    if (this.hasDisallowed(pw)) return this.SPECIAL_HELP;
    if (!this.pwValid(pw)) return "영문, 숫자, 특수문자를 포함한 8~16자로 입력해주세요.";
    return "";
  }

  fieldStyle(borderColor) {
    return {
      display: "flex", alignItems: "center", gap: 8,
      height: 62, borderRadius: 8, padding: "0 16px",
      background: "#F7FAF6", boxSizing: "border-box",
      border: "1.5px solid " + borderColor,
      transition: "border-color 150ms cubic-bezier(.2,.8,.2,1)",
    };
  }
  shake(which) {
    this.setState({ [which]: true });
    clearTimeout(this["_t_" + which]);
    this["_t_" + which] = setTimeout(() => this.setState({ [which]: false }), 400);
  }
  onLogin = () => {
    const idErr = this.idError(this.state.loginId);
    const pwErr = this.pwError(this.state.pw);
    if (idErr || pwErr) {
      if (idErr && this.state.loginId !== "") this.shake("idShake");
      if (pwErr && this.state.pw !== "") this.shake("pwShake");
      return;
    }
  };

  renderVals() {
    const st = this.state;
    const idErr = this.idError(st.loginId);
    const baseErr = this.pwError(st.pw);
    const pwErr = st.spaceError ? "비밀번호에 공백을 사용할 수 없습니다." : baseErr;
    const showIdError = !!idErr && st.loginId !== "";
    const showPwError = st.spaceError || (!!baseErr && st.pw !== "");

    let idBorder = "transparent";
    if (showIdError) idBorder = "#FF383C";
    else if (st.idFocused) idBorder = "#C9E9B4";
    else if (st.loginId.trim() !== "" && !idErr) idBorder = "#9FE870";

    let pwBorder = "transparent";
    if (showPwError) pwBorder = "#FF383C";
    else if (st.pwFocused) pwBorder = "#C9E9B4";
    else if (st.pw !== "" && !baseErr) pwBorder = "#9FE870";

    const ok = !idErr && !baseErr;
    const loginBtnStyle = {
      marginTop: 34, height: 53, borderRadius: 12, border: "none", width: "100%",
      fontFamily: "inherit", fontSize: 17.6, fontWeight: 500,
      transition: "background 150ms cubic-bezier(.2,.8,.2,1)",
      background: ok ? "#9FE870" : "rgba(159,232,112,0.4)",
      color: ok ? "#163300" : "rgba(22,51,0,0.4)",
      cursor: ok ? "pointer" : "default",
    };

    return {
      loginId: st.loginId, pw: st.pw,
      pwType: st.showPw ? "text" : "password",
      showPw: st.showPw, hidePw: !st.showPw,
      onId: (e) => this.setState({ loginId: e.target.value.replace(/[^0-9]/g, "") }),
      onPw: (e) => { const raw = e.target.value; this.setState({ pw: this.stripHangul(raw).replace(/\s/g, "") }); this.flagSpace(raw); },
      onIdFocus: () => this.setState({ idFocused: true }),
      onIdBlur: () => { this.setState({ idFocused: false }); if (this.state.loginId !== "" && this.idError(this.state.loginId)) this.shake("idShake"); },
      onPwFocus: () => this.setState({ pwFocused: true }),
      onPwBlur: () => { this.setState({ pwFocused: false }); if (this.state.pw !== "" && this.pwError(this.state.pw)) this.shake("pwShake"); },
      togglePw: () => this.setState(s => ({ showPw: !s.showPw })),
      onLogin: this.onLogin,
      idFieldStyle: this.fieldStyle(idBorder),
      pwFieldStyle: this.fieldStyle(pwBorder),
      idWrapClass: st.idShake ? "ph-shake" : "",
      pwWrapClass: st.pwShake ? "ph-shake" : "",
      showIdError, idErrorMsg: idErr,
      showPwError, pwErrorMsg: pwErr,
      loginBtnStyle,
    };
  }
}
</script>
</body>
</html>
