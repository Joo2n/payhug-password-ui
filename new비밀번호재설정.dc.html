<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="_ds/payhug-design-system-81d4f219-9751-4714-b38a-af7827ee8f91/tokens/fonts.css">
  <link rel="stylesheet" href="_ds/payhug-design-system-81d4f219-9751-4714-b38a-af7827ee8f91/tokens/colors.css">
  <link rel="stylesheet" href="_ds/payhug-design-system-81d4f219-9751-4714-b38a-af7827ee8f91/tokens/typography.css">
  <link rel="stylesheet" href="_ds/payhug-design-system-81d4f219-9751-4714-b38a-af7827ee8f91/tokens/spacing.css">
  <link rel="stylesheet" href="_ds/payhug-design-system-81d4f219-9751-4714-b38a-af7827ee8f91/styles.css">
  <script src="_ds/payhug-design-system-81d4f219-9751-4714-b38a-af7827ee8f91/_ds_bundle.js"></script>
  <style>
    html, body { margin: 0; padding: 0; background: #EEF0F2; }
    * { box-sizing: border-box; }
    input::placeholder { color: #A6AABB; }
    @keyframes phShake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(5px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(2px); }
    }
    .ph-shake { animation: phShake 0.38s cubic-bezier(.36,.07,.19,.97); }
  </style>
</helmet>
<div style="min-height:100vh;display:flex;justify-content:center;background:#EEF0F2;font-family:'Noto Sans KR',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
  <div style="width:400px;max-width:100%;min-height:100vh;background:#FFFFFF;box-shadow:0 0 50px rgba(0,0,0,0.06);display:flex;flex-direction:column;">

    <header style="height:56px;flex-shrink:0;display:flex;align-items:center;padding:0 12px;border-bottom:1px solid #F2F2F2;">
      <a href="new로그인.dc.html" aria-label="이전" style="width:40px;height:40px;display:flex;align-items:center;justify-content:center;color:#191919;text-decoration:none;">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"></path></svg>
      </a>
      <span style="font-size:16px;font-weight:600;color:#191919;">비밀번호 재설정</span>
    </header>

    <div style="flex:1;padding:28px 24px 36px;display:flex;flex-direction:column;">
      <h1 style="margin:0;font-size:22px;font-weight:700;line-height:1.35;color:#191919;letter-spacing:-0.02em;">새 비밀번호를 설정해 주세요</h1>

      <!-- 새 비밀번호 -->
      <div style="margin-top:26px;">
        <label style="display:block;font-size:13px;font-weight:600;color:#434548;margin-bottom:8px;">새 비밀번호</label>
        <div class="{{ pwWrapClass }}" style="{{ pwFieldStyle }}">
          <input ref="{{ pwRef }}" type="{{ pwType }}" value="{{ pw }}" onChange="{{ onPw }}" onFocus="{{ onPwFocus }}" onBlur="{{ onPwBlur }}" maxLength="30" placeholder="영문, 숫자, 특수문자 포함 8~16자" autoComplete="new-password" style="flex:1;min-width:0;border:none;outline:none;background:transparent;font-family:inherit;font-size:16px;color:#191919;padding:0;" />
          <button type="button" onClick="{{ togglePw }}" aria-label="비밀번호 표시 전환" style="flex-shrink:0;width:24px;height:24px;padding:0;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#9296AC;">
            <sc-if value="{{ showPw }}" hint-placeholder-val="{{ false }}">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.6-7 10-7 10 7 10 7-3.6 7-10 7-10-7-10-7z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </sc-if>
            <sc-if value="{{ hidePw }}" hint-placeholder-val="{{ true }}">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3l18 18"></path><path d="M10.6 10.6a2 2 0 002.8 2.8"></path><path d="M9.4 5.2A9.5 9.5 0 0112 5c5 0 9 4.5 9 7a12 12 0 01-2.2 3.1M6.3 6.3A12.4 12.4 0 003 12c0 2.5 4 7 9 7a9.4 9.4 0 004-.9"></path></svg>
            </sc-if>
          </button>
        </div>

        <sc-if value="{{ spaceError }}" hint-placeholder-val="{{ false }}">
          <p style="margin:9px 2px 0;font-size:13px;line-height:1.4;color:#FF383C;">비밀번호에 공백을 사용할 수 없습니다.</p>
        </sc-if>

        <sc-if value="{{ stateValid }}" hint-placeholder-val="{{ false }}">
          <div style="display:flex;align-items:center;gap:6px;margin-top:11px;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#5FBE2E" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"></path></svg>
            <span style="font-size:13px;font-weight:500;color:#5FBE2E;">사용 가능한 비밀번호입니다.</span>
          </div>
        </sc-if>

        <sc-if value="{{ stateTyping }}" hint-placeholder-val="{{ false }}">
          <div style="margin-top:11px;display:flex;flex-wrap:wrap;gap:8px 16px;">
            <sc-for list="{{ checks }}" as="c" hint-placeholder-count="4">
              <div style="display:flex;align-items:center;gap:5px;">
                <sc-if value="{{ c.met }}" hint-placeholder-val="{{ false }}">
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#5FBE2E" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"></path></svg>
                </sc-if>
                <sc-if value="{{ c.unmet }}" hint-placeholder-val="{{ true }}">
                  <span style="width:14px;height:14px;display:flex;align-items:center;justify-content:center;"><span style="width:4px;height:4px;border-radius:999px;background:#C7CAD6;display:block;"></span></span>
                </sc-if>
                <span style="font-size:12.5px;white-space:nowrap;color:{{ c.color }};">{{ c.label }}</span>
              </div>
            </sc-for>
          </div>
          <sc-if value="{{ showPwError }}" hint-placeholder-val="{{ false }}">
            <p style="margin:9px 2px 0;font-size:13px;line-height:1.4;color:#FF383C;">{{ pwErrorMsg }}</p>
          </sc-if>
        </sc-if>
      </div>

      <!-- 새 비밀번호 확인 -->
      <div style="margin-top:18px;">
        <label style="display:block;font-size:13px;font-weight:600;color:#434548;margin-bottom:8px;">새 비밀번호 확인</label>
        <div style="{{ pw2FieldStyle }}">
          <input type="{{ pw2Type }}" value="{{ pw2 }}" onChange="{{ onPw2 }}" onFocus="{{ onPw2Focus }}" onBlur="{{ onPw2Blur }}" maxLength="30" placeholder="비밀번호를 한번 더 입력해주세요" autoComplete="new-password" style="flex:1;min-width:0;border:none;outline:none;background:transparent;font-family:inherit;font-size:16px;color:#191919;padding:0;" />
          <button type="button" onClick="{{ togglePw2 }}" aria-label="비밀번호 표시 전환" style="flex-shrink:0;width:24px;height:24px;padding:0;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#9296AC;">
            <sc-if value="{{ showPw2 }}" hint-placeholder-val="{{ false }}">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.6-7 10-7 10 7 10 7-3.6 7-10 7-10-7-10-7z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </sc-if>
            <sc-if value="{{ hidePw2 }}" hint-placeholder-val="{{ true }}">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3l18 18"></path><path d="M10.6 10.6a2 2 0 002.8 2.8"></path><path d="M9.4 5.2A9.5 9.5 0 0112 5c5 0 9 4.5 9 7a12 12 0 01-2.2 3.1M6.3 6.3A12.4 12.4 0 003 12c0 2.5 4 7 9 7a9.4 9.4 0 004-.9"></path></svg>
            </sc-if>
          </button>
        </div>
        <div style="display:flex;align-items:center;gap:5px;margin-top:8px;">
          <sc-if value="{{ matchOk }}" hint-placeholder-val="{{ false }}">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#5FBE2E" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"></path></svg>
          </sc-if>
          <sc-if value="{{ matchBad }}" hint-placeholder-val="{{ false }}">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#FF383C" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18"></path><path d="M6 6l12 12"></path></svg>
          </sc-if>
          <span style="font-size:13px;line-height:1.4;color:{{ matchColor }};">{{ matchMsg }}</span>
        </div>
      </div>

      <button type="button" onClick="{{ onSubmit }}" style="{{ submitStyle }}">비밀번호 재설정</button>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:400,&quot;height&quot;:820}}">
class Component extends DCLogic {
  state = {
    pw: "", pw2: "",
    showPw: false, showPw2: false,
    pwFocused: false, pw2Focused: false,
    pwTouched: false,
    pwShake: false,
  };

  ALLOWED = "!@#$%^&*()";
  SPECIAL_HELP = "사용 가능한 특수문자: ! @ # $ % ^ & * ( )";

  stripHangul(v) { return (v || "").replace(/[\u1100-\u11FF\u3130-\u318F\uA960-\uA97F\uAC00-\uD7A3]/g, ""); }
  // 공백은 입력에서 제거하고, 시도 시 오류 문구를 잠시 노출
  flagSpace(raw) { if (/\s/.test(raw)) { this.setState({ spaceError: true }); clearTimeout(this._sp); this._sp = setTimeout(() => this.setState({ spaceError: false }), 2200); } }
  flagSpace2(raw) { if (/\s/.test(raw)) { this.setState({ spaceError2: true }); clearTimeout(this._sp2); this._sp2 = setTimeout(() => this.setState({ spaceError2: false }), 2200); } }

  constructor(props) { super(props); this.pwRef = React.createRef(); }

  hasSpace(pw) { return /\s/.test(pw); }
  hasDisallowed(pw) {
    for (const ch of pw) {
      if (/[A-Za-z0-9]/.test(ch)) continue;
      if (/\s/.test(ch)) continue;
      if (!this.ALLOWED.includes(ch)) return true;
    }
    return false;
  }
  hasSpecial(pw) { for (const ch of pw) if (this.ALLOWED.includes(ch)) return true; return false; }
  pwValid(pw) {
    return pw.length >= 8 && pw.length <= 16
      && /[A-Za-z]/.test(pw) && /[0-9]/.test(pw) && this.hasSpecial(pw)
      && !this.hasSpace(pw) && !this.hasDisallowed(pw);
  }
  // 틀렸을 때만 노출: 특수문자 오류 → 특수문자 안내, 그 외 → 일반 안내
  pwError(pw) {
    if (this.hasDisallowed(pw)) return this.SPECIAL_HELP;
    if (!this.pwValid(pw)) return "영문, 숫자, 특수문자를 포함한 8~16자로 입력해주세요.";
    return "";
  }

  fieldStyle(borderColor) {
    return {
      display: "flex", alignItems: "center", gap: 8,
      height: 54, borderRadius: 10, padding: "0 16px",
      background: "#F7FAF6", boxSizing: "border-box",
      border: "1.5px solid " + borderColor,
      transition: "border-color 150ms cubic-bezier(.2,.8,.2,1)",
    };
  }
  shakePw() {
    this.setState({ pwShake: true });
    clearTimeout(this._t); this._t = setTimeout(() => this.setState({ pwShake: false }), 400);
  }
  onSubmit = () => {
    const { pw, pw2 } = this.state;
    const ok = this.pwValid(pw) && pw2 !== "" && pw2 === pw;
    if (!ok) {
      this.setState({ pwTouched: true });
      if (!this.pwValid(pw)) { this.shakePw(); if (this.pwRef.current) this.pwRef.current.focus(); }
      return;
    }
    window.location.href = "new로그인.dc.html";
  };

  renderVals() {
    const st = this.state;
    const pw = st.pw, pw2 = st.pw2;
    const checks = [
      { label: "8~16자", met: pw.length >= 8 && pw.length <= 16 },
      { label: "영문 포함", met: /[A-Za-z]/.test(pw) },
      { label: "숫자 포함", met: /[0-9]/.test(pw) },
      { label: "특수문자 포함", met: this.hasSpecial(pw) && !this.hasDisallowed(pw) },
    ].map(c => ({ label: c.label, met: c.met, unmet: !c.met, color: c.met ? "#5FBE2E" : "#9296AC" }));

    const valid = this.pwValid(pw);
    const pwErr = this.pwError(pw);

    let pwBorder = "transparent";
    if (st.spaceError) pwBorder = "#FF383C";
    else if ((st.pwTouched && !valid && pw !== "") || (pwErr && pw !== "")) pwBorder = "#FF383C";
    else if (st.pwFocused) pwBorder = "#C9E9B4";
    else if (valid) pwBorder = "#9FE870";

    // 확인 필드: 기본 / 공백 / 특수문자 오류 / 불일치 / 일치
    const pw2Disallowed = pw2 !== "" && this.hasDisallowed(pw2);
    const matchOk = pw2 !== "" && !pw2Disallowed && !st.spaceError2 && pw2 === pw;
    const matchBad = st.spaceError2 || (pw2 !== "" && (pw2Disallowed || pw2 !== pw));
    let matchColor = "#7E8299", matchMsg = "비밀번호를 한번 더 입력해주세요.";
    if (st.spaceError2) { matchColor = "#FF383C"; matchMsg = "비밀번호에 공백을 사용할 수 없습니다."; }
    else if (pw2Disallowed) { matchColor = "#FF383C"; matchMsg = this.SPECIAL_HELP; }
    else if (matchOk) { matchColor = "#5FBE2E"; matchMsg = "비밀번호가 일치합니다."; }
    else if (pw2 !== "" && pw2 !== pw) { matchColor = "#FF383C"; matchMsg = "비밀번호가 일치하지 않습니다."; }

    let pw2Border = "transparent";
    if (matchBad) pw2Border = "#FF383C";
    else if (matchOk) pw2Border = "#9FE870";
    else if (st.pw2Focused) pw2Border = "#C9E9B4";

    const canSubmit = valid && pw2 !== "" && pw2 === pw;
    const submitStyle = {
      marginTop: 30, height: 52, borderRadius: 12, border: "none", width: "100%",
      fontFamily: "inherit", fontSize: 16.5, fontWeight: 600,
      transition: "background 150ms cubic-bezier(.2,.8,.2,1)",
      background: canSubmit ? "#9FE870" : "rgba(159,232,112,0.3)",
      color: canSubmit ? "#163300" : "rgba(22,51,0,0.35)",
      cursor: canSubmit ? "pointer" : "default",
    };

    return {
      pw, pw2,
      pwRef: this.pwRef,
      pwType: st.showPw ? "text" : "password",
      pw2Type: st.showPw2 ? "text" : "password",
      showPw: st.showPw, hidePw: !st.showPw,
      showPw2: st.showPw2, hidePw2: !st.showPw2,
      onPw: (e) => { const raw = e.target.value; this.setState({ pw: this.stripHangul(raw).replace(/\s/g, "") }); this.flagSpace(raw); },
      onPw2: (e) => { const raw = e.target.value; this.setState({ pw2: this.stripHangul(raw).replace(/\s/g, "") }); this.flagSpace2(raw); },
      onPwFocus: () => this.setState({ pwFocused: true }),
      onPwBlur: () => { this.setState({ pwFocused: false, pwTouched: true }); if (!this.pwValid(this.state.pw) && this.state.pw !== "") this.shakePw(); },
      onPw2Focus: () => this.setState({ pw2Focused: true }),
      onPw2Blur: () => this.setState({ pw2Focused: false }),
      togglePw: () => this.setState(s => ({ showPw: !s.showPw })),
      togglePw2: () => this.setState(s => ({ showPw2: !s.showPw2 })),
      onSubmit: this.onSubmit,
      pwFieldStyle: this.fieldStyle(pwBorder),
      pw2FieldStyle: this.fieldStyle(pw2Border),
      pwWrapClass: st.pwShake ? "ph-shake" : "",
      spaceError: st.spaceError,
      stateValid: pw !== "" && valid && !st.spaceError,
      stateTyping: pw !== "" && !valid && !st.spaceError,
      checks,
      showPwError: this.hasDisallowed(pw) || st.pwTouched,
      pwErrorMsg: pwErr,
      matchOk, matchBad, matchColor, matchMsg,
      submitStyle,
    };
  }
}
</script>
</body>
</html>
