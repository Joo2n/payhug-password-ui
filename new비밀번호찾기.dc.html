<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="_ds/payhug-design-system-81d4f219-9751-4714-b38a-af7827ee8f91/tokens/fonts.css">
  <link rel="stylesheet" href="_ds/payhug-design-system-81d4f219-9751-4714-b38a-af7827ee8f91/tokens/colors.css">
  <link rel="stylesheet" href="_ds/payhug-design-system-81d4f219-9751-4714-b38a-af7827ee8f91/tokens/typography.css">
  <link rel="stylesheet" href="_ds/payhug-design-system-81d4f219-9751-4714-b38a-af7827ee8f91/tokens/spacing.css">
  <link rel="stylesheet" href="_ds/payhug-design-system-81d4f219-9751-4714-b38a-af7827ee8f91/styles.css">
  <script src="_ds/payhug-design-system-81d4f219-9751-4714-b38a-af7827ee8f91/_ds_bundle.js"></script>
  <style>
    html, body { margin: 0; padding: 0; background: #FAF9FA; }
    * { box-sizing: border-box; }
    input::placeholder { color: #A0A4B8; }
    @keyframes phShake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(5px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(2px); }
    }
    .ph-shake { animation: phShake 0.38s cubic-bezier(.36,.07,.19,.97); }
  </style>
</helmet>
<div style="min-height:100vh;display:flex;flex-direction:column;background:#FAF9FA;font-family:'Noto Sans KR',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
  <header style="height:64px;flex-shrink:0;background:#FFFFFF;border-bottom:1px solid #F0F0F0;display:flex;align-items:center;padding:0 30px;">
    <img src="assets/payhug-logo.png" alt="Payhug" style="height:28px;width:auto;display:block;" />
  </header>

  <main style="flex:1;display:flex;flex-direction:column;align-items:center;padding:44px 16px 60px;">
    <!-- 단계 인디케이터 (2단계 중 1단계) -->
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:32px;">
      <span style="width:22px;height:9px;border-radius:999px;background:#0070FF;display:block;"></span>
      <span style="width:9px;height:9px;border-radius:999px;background:#D1D5DB;display:block;"></span>
    </div>

    <div style="width:490px;max-width:100%;border-radius:20px;background:#FFFFFF;box-shadow:0px 1px 20px 0px rgba(0,0,0,0.15);padding:32px 24px;display:flex;flex-direction:column;">
      <h1 style="margin:0;font-size:24px;font-weight:700;line-height:1.3;color:#191919;letter-spacing:-0.01em;">비밀번호를 잊으셨나요?</h1>
      <p style="margin:6px 0 0;font-size:14.4px;color:#7E8299;line-height:1.5;">본인 확인 후 비밀번호를 재설정할 수 있어요</p>

      <div style="margin-top:28px;">
        <label style="display:block;font-size:14.4px;color:#434548;margin-bottom:8px;">휴대전화번호</label>
        <div class="{{ phoneWrapClass }}" style="{{ phoneFieldStyle }}">
          <input type="tel" inputmode="numeric" value="{{ phone }}" onChange="{{ onPhone }}" onFocus="{{ onPhoneFocus }}" onBlur="{{ onPhoneBlur }}" maxLength="11" placeholder="숫자만 입력" style="flex:1;min-width:0;border:none;outline:none;background:transparent;font-family:inherit;font-size:16px;color:#191919;padding:0;" />
        </div>
        <sc-if value="{{ showPhoneError }}" hint-placeholder-val="{{ false }}">
          <p style="margin:8px 2px 0;font-size:13px;line-height:1.4;color:#FF383C;">{{ phoneErrorMsg }}</p>
        </sc-if>
      </div>

      <button type="button" onClick="{{ onVerify }}" style="{{ verifyBtnStyle }}">본인 인증</button>

      <div style="margin-top:20px;display:flex;justify-content:center;">
        <a href="new로그인.dc.html" style="font-size:14px;font-weight:500;color:#7E8299;text-decoration:none;">로그인으로 돌아가기</a>
      </div>
    </div>
  </main>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1240,&quot;height&quot;:753}}">
class Component extends DCLogic {
  state = {
    phone: "",
    phoneFocused: false,
    phoneTouched: false,
    phoneShake: false,
  };

  phoneError(v) {
    const d = (v || "").replace(/\D/g, "");
    if (d === "") return "휴대전화번호를 입력해주세요.";
    if (/^01/.test(d) && d.length >= 10 && d.length <= 11) return "";
    return "올바른 휴대전화번호 형식이 아닙니다.";
  }
  phoneValid(v) { return this.phoneError(v) === ""; }

  fieldStyle(borderColor) {
    return {
      display: "flex", alignItems: "center", gap: 8,
      height: 62, borderRadius: 8, padding: "0 16px",
      background: "#F7FAF6", boxSizing: "border-box",
      border: "1.5px solid " + borderColor,
      transition: "border-color 150ms cubic-bezier(.2,.8,.2,1)",
    };
  }
  shake() {
    this.setState({ phoneShake: true });
    clearTimeout(this._t); this._t = setTimeout(() => this.setState({ phoneShake: false }), 400);
  }
  onVerify = () => {
    if (!this.phoneValid(this.state.phone)) {
      this.setState({ phoneTouched: true });
      this.shake();
      return;
    }
    window.location.href = "new비밀번호재설정.dc.html";
  };

  renderVals() {
    const st = this.state;
    const err = this.phoneError(st.phone);
    const valid = err === "";
    // 형식 오류는 입력 중 실시간, 미입력 안내는 blur/시도 후
    const showPhoneError = !!err && (st.phone !== "" || st.phoneTouched);

    let border = "transparent";
    if (showPhoneError) border = "#FF383C";
    else if (st.phoneFocused) border = "#C9E9B4";
    else if (valid) border = "#9FE870";

    const verifyBtnStyle = {
      marginTop: 28, height: 53, borderRadius: 12, border: "none", width: "100%",
      fontFamily: "inherit", fontSize: 17.6, fontWeight: 500,
      transition: "background 150ms cubic-bezier(.2,.8,.2,1)",
      background: valid ? "#9FE870" : "rgba(159,232,112,0.4)",
      color: valid ? "#163300" : "rgba(22,51,0,0.4)",
      cursor: valid ? "pointer" : "default",
    };

    return {
      phone: st.phone,
      onPhone: (e) => this.setState({ phone: e.target.value.replace(/[^0-9]/g, "") }),
      onPhoneFocus: () => this.setState({ phoneFocused: true }),
      onPhoneBlur: () => { this.setState({ phoneFocused: false, phoneTouched: true }); if (!this.phoneValid(this.state.phone) && this.state.phone !== "") this.shake(); },
      onVerify: this.onVerify,
      phoneFieldStyle: this.fieldStyle(border),
      phoneWrapClass: st.phoneShake ? "ph-shake" : "",
      showPhoneError, phoneErrorMsg: err,
      verifyBtnStyle,
    };
  }
}
</script>
</body>
</html>
