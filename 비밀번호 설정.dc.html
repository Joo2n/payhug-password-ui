<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="_ds/payhug-design-system-81d4f219-9751-4714-b38a-af7827ee8f91/tokens/fonts.css">
  <link rel="stylesheet" href="_ds/payhug-design-system-81d4f219-9751-4714-b38a-af7827ee8f91/tokens/colors.css">
  <link rel="stylesheet" href="_ds/payhug-design-system-81d4f219-9751-4714-b38a-af7827ee8f91/tokens/typography.css">
  <link rel="stylesheet" href="_ds/payhug-design-system-81d4f219-9751-4714-b38a-af7827ee8f91/tokens/spacing.css">
  <link rel="stylesheet" href="_ds/payhug-design-system-81d4f219-9751-4714-b38a-af7827ee8f91/styles.css">
  <script src="_ds/payhug-design-system-81d4f219-9751-4714-b38a-af7827ee8f91/_ds_bundle.js"></script>
  <style>
    html, body { margin: 0; padding: 0; }
    * { box-sizing: border-box; }
    input::placeholder { color: #A0A4B8; }
    @keyframes phShake {
      0%,100% { transform: translateX(0); }
      15% { transform: translateX(-7px); }
      30% { transform: translateX(6px); }
      45% { transform: translateX(-5px); }
      60% { transform: translateX(4px); }
      75% { transform: translateX(-2px); }
    }
    @keyframes phToastIn {
      from { opacity: 0; transform: translate(-50%, 10px); }
      to { opacity: 1; transform: translate(-50%, 0); }
    }
    .ph-shake { animation: phShake 0.45s cubic-bezier(.36,.07,.19,.97); }
  </style>
</helmet>
<div style="min-height:100vh;background:#FAF9FA;display:flex;flex-direction:column;font-family:'Noto Sans KR',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
  <header style="height:64px;background:#FFFFFF;border-bottom:1px solid #F0F0F0;display:flex;align-items:center;padding:0 30px;flex-shrink:0;">
    <img src="assets/payhug-logo.png" alt="Payhug" style="height:27px;width:auto;display:block;" />
  </header>

  <main style="flex:1;display:flex;justify-content:center;align-items:flex-start;padding:56px 16px 40px;">

    <!-- ===================== 로그인 ===================== -->
    <sc-if value="{{ isLogin }}" hint-placeholder-val="{{ true }}">
      <div style="width:400px;max-width:100%;border-radius:20px;background:#FFFFFF;box-shadow:0px 1px 20px 0px rgba(0,0,0,0.15);padding:32px;display:flex;flex-direction:column;">
        <h1 style="margin:0;font-size:28px;font-weight:700;line-height:100%;color:#000000;letter-spacing:-0.02em;">사장님 로그인</h1>

        <div style="margin-top:34px;display:flex;flex-direction:column;gap:12px;">
          <div style="height:62px;border-radius:8px;background:#F7FAF6;display:flex;align-items:center;padding:0 16px;">
            <input type="text" value="{{ loginId }}" onChange="{{ onLoginId }}" placeholder="사업자등록번호 또는 휴대전화번호" style="flex:1;min-width:0;border:none;outline:none;background:transparent;font-family:inherit;font-size:16px;color:#191919;padding:0;" />
          </div>
          <div style="height:62px;border-radius:8px;background:#F7FAF6;display:flex;align-items:center;padding:0 16px;">
            <input type="password" value="{{ loginPw }}" onChange="{{ onLoginPw }}" placeholder="비밀번호" autoComplete="current-password" style="flex:1;min-width:0;border:none;outline:none;background:transparent;font-family:inherit;font-size:16px;color:#191919;padding:0;" />
          </div>
        </div>

        <div style="margin-top:34px;display:flex;flex-direction:column;gap:16px;">
          <button type="button" onClick="{{ onLogin }}" style="{{ loginBtnStyle }}">로그인</button>
          <button type="button" onClick="{{ goSetup }}" style="height:53px;border-radius:12px;background:#FFFFFF;border:1px solid #163300;font-family:inherit;font-size:17.6px;font-weight:500;color:#163300;cursor:pointer;">회원가입</button>
        </div>

        <div style="margin-top:24px;display:flex;justify-content:center;">
          <a href="#" style="font-size:16px;font-weight:500;color:#7E8299;text-decoration:none;">비밀번호 찾기</a>
        </div>
      </div>
    </sc-if>

    <!-- ===================== 비밀번호 설정 (회원가입) ===================== -->
    <sc-if value="{{ isSetup }}" hint-placeholder-val="{{ false }}">
      <div style="width:400px;max-width:100%;border-radius:20px;background:#FFFFFF;box-shadow:0px 1px 20px 0px rgba(0,0,0,0.15);padding:32px;display:flex;flex-direction:column;">

        <button type="button" onClick="{{ goLogin }}" aria-label="이전" style="width:32px;height:32px;margin:0 0 8px -6px;padding:0;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#191919;">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"></path></svg>
        </button>

        <h1 style="margin:0;font-size:28px;font-weight:700;line-height:100%;color:#000000;letter-spacing:-0.02em;">비밀번호 설정</h1>
        <p style="margin:12px 0 0;font-size:14px;line-height:1.5;color:#7E8299;">로그인에 사용할 비밀번호를 설정해 주세요.</p>

        <!-- 비밀번호 입력 -->
        <div style="margin-top:28px;">
          <div class="{{ pwWrapClass }}" style="{{ pwFieldStyle }}">
            <input ref="{{ pwRef }}" type="{{ pwType }}" value="{{ pw }}" onChange="{{ onPw }}" onFocus="{{ onPwFocus }}" onBlur="{{ onPwBlur }}" maxLength="40" placeholder="비밀번호" autoComplete="new-password" style="flex:1;min-width:0;border:none;outline:none;background:transparent;font-family:inherit;font-size:16px;line-height:24px;color:#191919;padding:0;" />
            <button type="button" onClick="{{ togglePw }}" aria-label="비밀번호 표시 전환" style="flex-shrink:0;width:24px;height:24px;padding:0;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#9296AC;">
              <sc-if value="{{ showPw }}" hint-placeholder-val="{{ false }}">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3l18 18"></path><path d="M10.6 10.6a2 2 0 002.8 2.8"></path><path d="M9.4 5.2A9.5 9.5 0 0112 5c5 0 9 4.5 9 7a12 12 0 01-2.2 3.1M6.3 6.3A12.4 12.4 0 003 12c0 2.5 4 7 9 7a9.4 9.4 0 004-.9"></path></svg>
              </sc-if>
              <sc-if value="{{ hidePw }}" hint-placeholder-val="{{ true }}">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.6-7 10-7 10 7 10 7-3.6 7-10 7-10-7-10-7z"></path><circle cx="12" cy="12" r="3"></circle></svg>
              </sc-if>
            </button>
          </div>

          <sc-if value="{{ showPwError }}" hint-placeholder-val="{{ false }}">
            <div style="display:flex;align-items:center;gap:5px;margin-top:8px;">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#FF383C" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9" stroke-width="1.7"></circle><path d="M12 7.5v5.5"></path><path d="M12 16.2v.2"></path></svg>
              <span style="font-size:13px;line-height:1.4;color:#FF383C;">{{ pwErrorMsg }}</span>
            </div>
          </sc-if>

          <sc-if value="{{ allValid }}" hint-placeholder-val="{{ false }}">
            <div style="display:flex;align-items:center;gap:6px;margin-top:12px;">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#5FBE2E" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"></path></svg>
              <span style="font-size:13px;font-weight:500;color:#5FBE2E;">사용 가능한 비밀번호입니다.</span>
            </div>
          </sc-if>

          <sc-if value="{{ showChecklist }}" hint-placeholder-val="{{ true }}">
            <div style="margin-top:14px;">
              <p style="margin:0 0 10px;font-size:12.5px;line-height:1.5;color:#7E8299;">영문 대문자, 소문자, 숫자, 특수문자 중 2종 이상 조합하여 8~20자로 입력해 주세요.</p>
              <div style="display:flex;flex-direction:column;gap:7px;">
                <sc-for list="{{ conditions }}" as="c" hint-placeholder-count="6">
                  <div style="display:flex;align-items:center;gap:8px;">
                    <span style="width:16px;height:16px;flex-shrink:0;display:flex;align-items:center;justify-content:center;">
                      <sc-if value="{{ c.isCheck }}" hint-placeholder-val="{{ false }}">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#5FBE2E" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"></path></svg>
                      </sc-if>
                      <sc-if value="{{ c.isX }}" hint-placeholder-val="{{ false }}">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#FF383C" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18"></path><path d="M6 6l12 12"></path></svg>
                      </sc-if>
                      <sc-if value="{{ c.isDot }}" hint-placeholder-val="{{ true }}">
                        <span style="width:5px;height:5px;border-radius:999px;background:#C7CAD6;display:block;"></span>
                      </sc-if>
                    </span>
                    <span style="font-size:13px;line-height:1.35;color:{{ c.textColor }};">{{ c.label }}</span>
                  </div>
                </sc-for>
              </div>
            </div>
          </sc-if>
        </div>

        <!-- 비밀번호 확인 -->
        <div style="margin-top:20px;">
          <div style="{{ pw2FieldStyle }}">
            <input type="{{ pw2Type }}" value="{{ pw2 }}" onChange="{{ onPw2 }}" onFocus="{{ onPw2Focus }}" onBlur="{{ onPw2Blur }}" maxLength="40" placeholder="비밀번호 확인" autoComplete="new-password" style="flex:1;min-width:0;border:none;outline:none;background:transparent;font-family:inherit;font-size:16px;line-height:24px;color:#191919;padding:0;" />
            <button type="button" onClick="{{ togglePw2 }}" aria-label="비밀번호 표시 전환" style="flex-shrink:0;width:24px;height:24px;padding:0;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#9296AC;">
              <sc-if value="{{ showPw2 }}" hint-placeholder-val="{{ false }}">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3l18 18"></path><path d="M10.6 10.6a2 2 0 002.8 2.8"></path><path d="M9.4 5.2A9.5 9.5 0 0112 5c5 0 9 4.5 9 7a12 12 0 01-2.2 3.1M6.3 6.3A12.4 12.4 0 003 12c0 2.5 4 7 9 7a9.4 9.4 0 004-.9"></path></svg>
              </sc-if>
              <sc-if value="{{ hidePw2 }}" hint-placeholder-val="{{ true }}">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.6-7 10-7 10 7 10 7-3.6 7-10 7-10-7-10-7z"></path><circle cx="12" cy="12" r="3"></circle></svg>
              </sc-if>
            </button>
          </div>
          <sc-if value="{{ showMatch }}" hint-placeholder-val="{{ false }}">
            <div style="display:flex;align-items:center;gap:5px;margin-top:8px;">
              <sc-if value="{{ matchOk }}" hint-placeholder-val="{{ true }}">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#5FBE2E" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"></path></svg>
              </sc-if>
              <sc-if value="{{ matchBad }}" hint-placeholder-val="{{ false }}">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#FF383C" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18"></path><path d="M6 6l12 12"></path></svg>
              </sc-if>
              <span style="font-size:13px;line-height:1.4;color:{{ matchColor }};">{{ matchMsg }}</span>
            </div>
          </sc-if>
        </div>

        <button type="button" onClick="{{ onSubmit }}" style="{{ submitStyle }}">비밀번호 설정 완료</button>
      </div>
    </sc-if>

  </main>

  <footer style="display:flex;justify-content:center;align-items:center;gap:4px;padding:0 16px 28px;">
    <span style="font-size:13px;font-weight:500;color:#7E8299;">©주식회사 페이허그</span>
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#7E8299" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"></path></svg>
  </footer>

  <sc-if value="{{ toast }}" hint-placeholder-val="{{ false }}">
    <div style="{{ toastStyle }}">
      <span style="font-size:14px;font-weight:500;">{{ toastMsg }}</span>
    </div>
  </sc-if>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1512,&quot;height&quot;:860},&quot;userId&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;gojjambbong&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;검증 기준 값&quot;},&quot;userEmail&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;owner@payhug.io&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;검증 기준 값&quot;},&quot;userPhone&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;01012345678&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;검증 기준 값&quot;}}">
class Component extends DCLogic {
  state = {
    screen: "login",
    loginId: "",
    loginPw: "",
    pw: "",
    pw2: "",
    showPw: false,
    showPw2: false,
    pwFocused: false,
    pw2Focused: false,
    pwTouched: false,
    pw2Touched: false,
    shake: false,
    toast: null,
  };

  ALLOWED = "!@#$%^&*()-_+=[]{}|;:'\",.<>/?`~";

  constructor(props) {
    super(props);
    this.pwRef = React.createRef();
  }

  creds() {
    return [
      (this.props.userId || "").trim(),
      (this.props.userEmail || "").trim(),
      (this.props.userPhone || "").trim(),
    ].filter(Boolean);
  }

  classCount(pw) {
    let u = false, l = false, d = false, s = false;
    for (const ch of pw) {
      if (/[A-Z]/.test(ch)) u = true;
      else if (/[a-z]/.test(ch)) l = true;
      else if (/[0-9]/.test(ch)) d = true;
      else if (this.ALLOWED.includes(ch)) s = true;
    }
    return (u ? 1 : 0) + (l ? 1 : 0) + (d ? 1 : 0) + (s ? 1 : 0);
  }

  hasSpace(pw) { return /\s/.test(pw); }

  hasDisallowed(pw) {
    for (const ch of pw) {
      if (/[A-Za-z0-9]/.test(ch)) continue;
      if (/\s/.test(ch)) continue;
      if (!this.ALLOWED.includes(ch)) return true;
    }
    return false;
  }

  sameAsCred(pw) {
    if (!pw) return false;
    const low = pw.toLowerCase();
    return this.creds().some(c => c.toLowerCase() === low);
  }

  tripleRepeat(pw) { return /(.)\1\1/.test(pw); }

  sequence4(pw) {
    if (pw.length < 4) return false;
    let asc = 1, desc = 1;
    for (let i = 1; i < pw.length; i++) {
      const diff = pw.charCodeAt(i) - pw.charCodeAt(i - 1);
      if (diff === 1) { asc++; desc = 1; }
      else if (diff === -1) { desc++; asc = 1; }
      else { asc = 1; desc = 1; }
      if (asc >= 4 || desc >= 4) return true;
    }
    return false;
  }

  checks(pw) {
    return {
      len: pw.length >= 8 && pw.length <= 20,
      combo: this.classCount(pw) >= 2,
      space: !this.hasSpace(pw),
      cred: !this.sameAsCred(pw),
      triple: !this.tripleRepeat(pw),
      seq: !this.sequence4(pw),
      allowed: !this.hasDisallowed(pw),
    };
  }

  isValid(pw) {
    const c = this.checks(pw);
    return c.len && c.combo && c.space && c.cred && c.triple && c.seq && c.allowed;
  }

  errorFor(pw) {
    if (pw === "") return "비밀번호를 입력해 주세요.";
    if (pw.length < 8) return "비밀번호는 8자 이상 입력해 주세요.";
    if (pw.length > 20) return "비밀번호는 20자 이하로 입력해 주세요.";
    if (this.hasSpace(pw)) return "비밀번호에는 공백을 사용할 수 없습니다.";
    if (this.hasDisallowed(pw)) return "사용할 수 없는 특수문자가 포함되어 있습니다.";
    if (this.classCount(pw) < 2) return "영문 대문자, 소문자, 숫자, 특수문자 중 2종 이상을 조합해 주세요.";
    if (this.sameAsCred(pw)) return "아이디, 이메일, 휴대폰번호와 동일한 비밀번호는 사용할 수 없습니다.";
    if (this.tripleRepeat(pw)) return "동일한 문자를 3회 이상 연속으로 사용할 수 없습니다.";
    if (this.sequence4(pw)) return "연속된 문자 또는 숫자는 4자리 이상 사용할 수 없습니다.";
    return "";
  }

  fieldStyle(borderColor) {
    return {
      display: "flex", alignItems: "center", gap: 8,
      height: 56, borderRadius: 8, padding: "0 16px",
      background: "#F7FAF6", boxSizing: "border-box",
      border: "1.5px solid " + borderColor,
      transition: "border-color 160ms cubic-bezier(.2,.8,.2,1)",
    };
  }

  triggerShake() {
    this.setState({ shake: true });
    clearTimeout(this._shakeT);
    this._shakeT = setTimeout(() => this.setState({ shake: false }), 460);
  }

  showToast(msg, type) {
    this.setState({ toast: { msg, type: type || "success" } });
    clearTimeout(this._toastT);
    this._toastT = setTimeout(() => this.setState({ toast: null }), 2800);
  }

  onLogin = () => {
    const { loginId, loginPw } = this.state;
    if (!loginId.trim() || !loginPw) return;
    this.showToast("로그인되었습니다.", "success");
  };

  onSubmit = () => {
    const { pw, pw2 } = this.state;
    const ok = this.isValid(pw) && pw2 !== "" && pw2 === pw;
    if (!ok) {
      this.setState({ pwTouched: true, pw2Touched: true });
      this.triggerShake();
      if (this.pwRef.current) this.pwRef.current.focus();
      return;
    }
    this.showToast("비밀번호가 설정되었습니다.", "success");
  };

  renderVals() {
    const st = this.state;
    const pw = st.pw, pw2 = st.pw2;
    const c = this.checks(pw);
    const valid = this.isValid(pw);
    const err = this.errorFor(pw);
    const showPwError = st.pwTouched && !!err && !valid;

    const req = (ok) => pw === "" ? "default" : (ok ? "success" : "default");
    const proh = (ok) => pw === "" ? "default" : (ok ? "success" : "error");
    const rows = [
      { label: "8자 이상 20자 이하", status: req(c.len) },
      { label: "영문 대문자, 소문자, 숫자, 특수문자 중 2종 이상", status: req(c.combo) },
      { label: "공백 사용 불가", status: proh(c.space) },
      { label: "아이디, 이메일, 휴대폰번호와 동일한 값 사용 불가", status: proh(c.cred) },
      { label: "동일 문자 3회 이상 반복 불가", status: proh(c.triple) },
      { label: "연속된 문자 또는 숫자 4자리 이상 사용 불가", status: proh(c.seq) },
    ];
    const conditions = rows.map(r => ({
      label: r.label,
      isCheck: r.status === "success",
      isX: r.status === "error",
      isDot: r.status === "default",
      textColor: r.status === "success" ? "#5FBE2E" : (r.status === "error" ? "#FF383C" : "#7E8299"),
    }));

    let pwBorder = "transparent";
    if (showPwError) pwBorder = "#FF383C";
    else if (valid && pw !== "") pwBorder = "#9FE870";
    else if (st.pwFocused) pwBorder = "#C9E9B4";

    const showMatch = pw2 !== "";
    const matchOk = pw2 !== "" && pw2 === pw;
    const matchBad = pw2 !== "" && pw2 !== pw;
    let pw2Border = "transparent";
    if (showMatch && matchBad) pw2Border = "#FF383C";
    else if (showMatch && matchOk) pw2Border = "#9FE870";
    else if (st.pw2Focused) pw2Border = "#C9E9B4";

    const canSubmit = valid && pw2 !== "" && pw2 === pw;
    const submitStyle = {
      marginTop: 24, height: 53, borderRadius: 12, border: "none",
      width: "100%", fontFamily: "inherit", fontSize: 17,
      fontWeight: 600, letterSpacing: "-0.01em",
      transition: "background 160ms cubic-bezier(.2,.8,.2,1)",
      background: canSubmit ? "#9FE870" : "rgba(159,232,112,0.3)",
      color: canSubmit ? "#163300" : "rgba(22,51,0,0.35)",
      cursor: canSubmit ? "pointer" : "default",
    };

    const loginOk = st.loginId.trim() !== "" && st.loginPw !== "";
    const loginBtnStyle = {
      height: 53, borderRadius: 12, border: "none", width: "100%",
      fontFamily: "inherit", fontSize: 17.6, fontWeight: 500,
      transition: "background 160ms cubic-bezier(.2,.8,.2,1)",
      background: loginOk ? "#9FE870" : "rgba(159,232,112,0.3)",
      color: loginOk ? "#163300" : "rgba(22,51,0,0.3)",
      cursor: loginOk ? "pointer" : "default",
    };

    const toastStyle = {
      position: "fixed", left: "50%", bottom: 36,
      transform: "translateX(-50%)",
      background: st.toast && st.toast.type === "error" ? "#E9152D" : "#163300",
      color: "#FFFFFF", padding: "13px 22px", borderRadius: 12,
      boxShadow: "0px 6px 24px rgba(0,0,0,0.22)",
      display: "flex", alignItems: "center", gap: 8,
      animation: "phToastIn 220ms cubic-bezier(.2,.8,.2,1)",
      zIndex: 100, maxWidth: "90vw",
    };

    return {
      isLogin: st.screen === "login",
      isSetup: st.screen === "setup",
      goSetup: () => this.setState({ screen: "setup" }),
      goLogin: () => this.setState({ screen: "login" }),
      loginId: st.loginId,
      loginPw: st.loginPw,
      onLoginId: (e) => this.setState({ loginId: e.target.value }),
      onLoginPw: (e) => this.setState({ loginPw: e.target.value }),
      onLogin: this.onLogin,
      loginBtnStyle,

      pw, pw2,
      pwRef: this.pwRef,
      pwType: st.showPw ? "text" : "password",
      pw2Type: st.showPw2 ? "text" : "password",
      showPw: st.showPw, hidePw: !st.showPw,
      showPw2: st.showPw2, hidePw2: !st.showPw2,
      onPw: (e) => this.setState({ pw: e.target.value }),
      onPw2: (e) => this.setState({ pw2: e.target.value }),
      onPwFocus: () => this.setState({ pwFocused: true }),
      onPwBlur: () => this.setState({ pwFocused: false, pwTouched: true }),
      onPw2Focus: () => this.setState({ pw2Focused: true }),
      onPw2Blur: () => this.setState({ pw2Focused: false, pw2Touched: true }),
      togglePw: () => this.setState(s => ({ showPw: !s.showPw })),
      togglePw2: () => this.setState(s => ({ showPw2: !s.showPw2 })),
      onSubmit: this.onSubmit,
      pwFieldStyle: this.fieldStyle(pwBorder),
      pw2FieldStyle: this.fieldStyle(pw2Border),
      pwWrapClass: st.shake ? "ph-shake" : "",
      conditions,
      allValid: valid,
      showChecklist: !valid,
      showPwError,
      pwErrorMsg: err,
      showMatch,
      matchOk, matchBad,
      matchColor: matchOk ? "#5FBE2E" : "#FF383C",
      matchMsg: matchOk ? "비밀번호가 일치합니다." : "비밀번호가 일치하지 않습니다.",
      submitStyle,

      toast: !!st.toast,
      toastMsg: st.toast ? st.toast.msg : "",
      toastStyle,
    };
  }
}
</script>
</body>
</html>
