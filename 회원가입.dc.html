<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="_ds/payhug-design-system-81d4f219-9751-4714-b38a-af7827ee8f91/tokens/fonts.css">
  <link rel="stylesheet" href="_ds/payhug-design-system-81d4f219-9751-4714-b38a-af7827ee8f91/tokens/colors.css">
  <link rel="stylesheet" href="_ds/payhug-design-system-81d4f219-9751-4714-b38a-af7827ee8f91/tokens/typography.css">
  <link rel="stylesheet" href="_ds/payhug-design-system-81d4f219-9751-4714-b38a-af7827ee8f91/tokens/spacing.css">
  <link rel="stylesheet" href="_ds/payhug-design-system-81d4f219-9751-4714-b38a-af7827ee8f91/styles.css">
  <script src="_ds/payhug-design-system-81d4f219-9751-4714-b38a-af7827ee8f91/_ds_bundle.js"></script>
  <style>
    html, body { margin: 0; padding: 0; background: #EEF0F2; }
    * { box-sizing: border-box; }
    input::placeholder { color: #A6AABB; }
    @keyframes phShake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(5px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(2px); }
    }
    .ph-shake { animation: phShake 0.38s cubic-bezier(.36,.07,.19,.97); }
  </style>
</helmet>
<div style="min-height:100vh;display:flex;justify-content:center;background:#EEF0F2;font-family:'Noto Sans KR',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
  <div style="width:400px;max-width:100%;min-height:100vh;background:#FFFFFF;box-shadow:0 0 50px rgba(0,0,0,0.06);display:flex;flex-direction:column;">

    <header style="height:56px;flex-shrink:0;display:flex;align-items:center;padding:0 12px;border-bottom:1px solid #F2F2F2;">
      <a href="로그인.dc.html" aria-label="이전" style="width:40px;height:40px;display:flex;align-items:center;justify-content:center;color:#191919;text-decoration:none;">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"></path></svg>
      </a>
      <span style="font-size:16px;font-weight:600;color:#191919;">회원가입</span>
    </header>

    <div style="flex:1;padding:28px 24px 36px;display:flex;flex-direction:column;">
      <h1 style="margin:0;font-size:22px;font-weight:700;line-height:1.35;color:#191919;letter-spacing:-0.02em;">계정 정보를 입력해 주세요</h1>

      <!-- ▼ 아이디 / 이메일 / 휴대전화번호 항목 — 요청에 따라 숨김 처리 (주석). 필요 시 주석을 해제해 사용하세요.
      [아이디]
      <div style="margin-top:26px;">
        <label style="display:block;font-size:13px;font-weight:600;color:#434548;margin-bottom:8px;">아이디</label>
        <div style="{{ idFieldStyle }}">
          <input type="text" value="{{ userId }}" onChange="{{ onUserId }}" onBlur="{{ onIdBlur }}" placeholder="아이디를 입력해 주세요" style="flex:1;min-width:0;border:none;outline:none;background:transparent;font-family:inherit;font-size:16px;color:#191919;padding:0;" />
        </div>
        <sc-if value="{{ showIdError }}" hint-placeholder-val="{{ false }}">
          <p style="margin:7px 2px 0;font-size:13px;color:#FF383C;">{{ idErrorMsg }}</p>
        </sc-if>
      </div>
      [이메일]
      <div style="margin-top:16px;">
        <label style="display:block;font-size:13px;font-weight:600;color:#434548;margin-bottom:8px;">이메일</label>
        <div style="{{ emailFieldStyle }}">
          <input type="email" value="{{ email }}" onChange="{{ onEmail }}" onBlur="{{ onEmailBlur }}" placeholder="example@payhug.io" style="flex:1;min-width:0;border:none;outline:none;background:transparent;font-family:inherit;font-size:16px;color:#191919;padding:0;" />
        </div>
        <sc-if value="{{ showEmailError }}" hint-placeholder-val="{{ false }}">
          <p style="margin:7px 2px 0;font-size:13px;color:#FF383C;">{{ emailErrorMsg }}</p>
        </sc-if>
      </div>
      [휴대전화번호]
      <div style="margin-top:16px;">
        <label style="display:block;font-size:13px;font-weight:600;color:#434548;margin-bottom:8px;">휴대전화번호</label>
        <div style="{{ phoneFieldStyle }}">
          <input type="tel" inputmode="numeric" value="{{ phone }}" onChange="{{ onPhone }}" onBlur="{{ onPhoneBlur }}" placeholder="숫자만 입력" style="flex:1;min-width:0;border:none;outline:none;background:transparent;font-family:inherit;font-size:16px;color:#191919;padding:0;" />
        </div>
        <sc-if value="{{ showPhoneError }}" hint-placeholder-val="{{ false }}">
          <p style="margin:7px 2px 0;font-size:13px;color:#FF383C;">{{ phoneErrorMsg }}</p>
        </sc-if>
      </div>
      -->

      <!-- 비밀번호 -->
      <div style="margin-top:16px;">
        <label style="display:block;font-size:13px;font-weight:600;color:#434548;margin-bottom:8px;">비밀번호</label>
        <div class="{{ pwWrapClass }}" style="{{ pwFieldStyle }}">
          <input ref="{{ pwRef }}" type="{{ pwType }}" value="{{ pw }}" onChange="{{ onPw }}" onFocus="{{ onPwFocus }}" onBlur="{{ onPwBlur }}" maxLength="30" placeholder="영문, 숫자, 특수문자 포함 8~16자" autoComplete="new-password" style="flex:1;min-width:0;border:none;outline:none;background:transparent;font-family:inherit;font-size:16px;color:#191919;padding:0;" />
          <button type="button" onClick="{{ togglePw }}" aria-label="비밀번호 표시 전환" style="flex-shrink:0;width:24px;height:24px;padding:0;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#9296AC;">
            <sc-if value="{{ showPw }}" hint-placeholder-val="{{ false }}">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3l18 18"></path><path d="M10.6 10.6a2 2 0 002.8 2.8"></path><path d="M9.4 5.2A9.5 9.5 0 0112 5c5 0 9 4.5 9 7a12 12 0 01-2.2 3.1M6.3 6.3A12.4 12.4 0 003 12c0 2.5 4 7 9 7a9.4 9.4 0 004-.9"></path></svg>
            </sc-if>
            <sc-if value="{{ hidePw }}" hint-placeholder-val="{{ true }}">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.6-7 10-7 10 7 10 7-3.6 7-10 7-10-7-10-7z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </sc-if>
          </button>
        </div>

        <!-- 실시간 유효성 검사 -->
        <sc-if value="{{ pwTyping }}" hint-placeholder-val="{{ false }}">
          <div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:8px 16px;">
            <sc-for list="{{ checks }}" as="c" hint-placeholder-count="5">
              <div style="display:flex;align-items:center;gap:5px;">
                <sc-if value="{{ c.met }}" hint-placeholder-val="{{ false }}">
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#5FBE2E" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"></path></svg>
                </sc-if>
                <sc-if value="{{ c.unmet }}" hint-placeholder-val="{{ true }}">
                  <span style="width:14px;height:14px;display:flex;align-items:center;justify-content:center;"><span style="width:4px;height:4px;border-radius:999px;background:#C7CAD6;display:block;"></span></span>
                </sc-if>
                <span style="font-size:12.5px;white-space:nowrap;color:{{ c.color }};">{{ c.label }}</span>
              </div>
            </sc-for>
          </div>
          <sc-if value="{{ showPwError }}" hint-placeholder-val="{{ false }}">
            <p style="margin:9px 2px 0;font-size:13px;line-height:1.4;color:#FF383C;">{{ pwErrorMsg }}</p>
          </sc-if>
        </sc-if>
      </div>

      <button type="button" onClick="{{ onSubmit }}" style="{{ submitStyle }}">가입 완료</button>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:400,&quot;height&quot;:860}}">
class Component extends DCLogic {
  state = {
    userId: "", email: "", phone: "", pw: "",
    showPw: false,
    pwFocused: false,
    idTouched: false, emailTouched: false, phoneTouched: false, pwTouched: false,
    pwShake: false,
  };

  ALLOWED = "!@#$%^&*()-_+=[]{}|;:'\",.<>/?`~";

  constructor(props) { super(props); this.pwRef = React.createRef(); }

  idError(v) {
    const s = (v || "").trim();
    if (s === "") return "아이디를 입력해 주세요.";
    if (s.length < 4) return "아이디는 4자 이상 입력해 주세요.";
    return "";
  }
  emailError(v) {
    const s = (v || "").trim();
    if (s === "") return "이메일을 입력해 주세요.";
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(s)) return "올바른 이메일 형식이 아닙니다.";
    return "";
  }
  phoneError(v) {
    const s = (v || "").trim();
    if (s === "") return "휴대전화번호를 입력해 주세요.";
    const d = s.replace(/\D/g, "");
    if (/^01/.test(d) && d.length >= 10 && d.length <= 11) return "";
    return "올바른 휴대전화번호 형식이 아닙니다.";
  }

  classCount(pw) {
    let u = false, l = false, d = false, s = false;
    for (const ch of pw) {
      if (/[A-Z]/.test(ch)) u = true;
      else if (/[a-z]/.test(ch)) l = true;
      else if (/[0-9]/.test(ch)) d = true;
      else if (this.ALLOWED.includes(ch)) s = true;
    }
    return (u ? 1 : 0) + (l ? 1 : 0) + (d ? 1 : 0) + (s ? 1 : 0);
  }
  hasSpace(pw) { return /\s/.test(pw); }
  // 한글·공백·허용되지 않은 특수문자는 입력 단계에서 제거 (영문/숫자/허용 특수문자만 허용)
  sanitize(v) { let o = ""; for (const ch of (v || "")) if (/[A-Za-z0-9]/.test(ch) || this.ALLOWED.includes(ch)) o += ch; return o; }
  flagSpace(raw) { if (/\s/.test(raw)) { this.setState({ spaceError: true }); clearTimeout(this._sp); this._sp = setTimeout(() => this.setState({ spaceError: false }), 2200); } }
  hasDisallowed(pw) {
    for (const ch of pw) {
      if (/[A-Za-z0-9]/.test(ch)) continue;
      if (/\s/.test(ch)) continue;
      if (!this.ALLOWED.includes(ch)) return true;
    }
    return false;
  }
  sameAsCred(pw) {
    if (!pw) return false;
    const low = pw.toLowerCase();
    return [this.state.userId, this.state.email, this.state.phone]
      .map(x => (x || "").trim().toLowerCase()).filter(Boolean)
      .some(c => c === low);
  }
  tripleRepeat(pw) { return /(.)\1\1/.test(pw); }
  sequence4(pw) {
    if (pw.length < 4) return false;
    let asc = 1, desc = 1;
    for (let i = 1; i < pw.length; i++) {
      const diff = pw.charCodeAt(i) - pw.charCodeAt(i - 1);
      if (diff === 1) { asc++; desc = 1; }
      else if (diff === -1) { desc++; asc = 1; }
      else { asc = 1; desc = 1; }
      if (asc >= 4 || desc >= 4) return true;
    }
    return false;
  }

  pwValid(pw) {
    return pw.length >= 8 && pw.length <= 16
      && this.classCount(pw) >= 2
      && !this.hasSpace(pw) && !this.hasDisallowed(pw)
      && !this.sameAsCred(pw) && !this.tripleRepeat(pw) && !this.sequence4(pw);
  }

  pwPriorityError(pw) {
    if (pw === "") return "비밀번호를 입력해 주세요.";
    if (this.hasSpace(pw)) return "공백은 사용할 수 없습니다.";
    if (this.hasDisallowed(pw)) return "사용할 수 없는 특수문자가 포함되어 있습니다.";
    if (pw.length < 8 || pw.length > 16) return "비밀번호는 8~16자로 입력해 주세요.";
    if (this.classCount(pw) < 2) return "영문, 숫자, 특수문자 중 2종 이상 조합해 주세요.";
    if (this.sameAsCred(pw)) return "아이디, 이메일, 휴대전화번호와 동일한 비밀번호는 사용할 수 없습니다.";
    if (this.tripleRepeat(pw)) return "동일한 문자를 3회 이상 연속으로 사용할 수 없습니다.";
    if (this.sequence4(pw)) return "연속된 문자 또는 숫자는 4자리 이상 사용할 수 없습니다.";
    return "";
  }

  fieldStyle(borderColor) {
    return {
      display: "flex", alignItems: "center", gap: 8,
      height: 54, borderRadius: 10, padding: "0 16px",
      background: "#F7FAF6", boxSizing: "border-box",
      border: "1.5px solid " + borderColor,
      transition: "border-color 150ms cubic-bezier(.2,.8,.2,1)",
    };
  }
  shakePw() {
    this.setState({ pwShake: true });
    clearTimeout(this._t); this._t = setTimeout(() => this.setState({ pwShake: false }), 400);
  }

  onSubmit = () => {
    const s = this.state;
    const allOk = !this.idError(s.userId) && !this.emailError(s.email) && !this.phoneError(s.phone) && this.pwValid(s.pw);
    if (!allOk) {
      this.setState({ idTouched: true, emailTouched: true, phoneTouched: true, pwTouched: true });
      if (!this.pwValid(s.pw)) { this.shakePw(); if (this.pwRef.current) this.pwRef.current.focus(); }
      return;
    }
    window.location.href = "로그인.dc.html";
  };

  border(touched, err, focused, filledOk) {
    if (touched && err) return "#FF383C";
    if (focused) return "#C9E9B4";
    if (filledOk) return "#9FE870";
    return "transparent";
  }

  renderVals() {
    const st = this.state;
    const pw = st.pw;
    const letter = /[A-Za-z]/.test(pw);
    const digit = /[0-9]/.test(pw);
    let special = false; for (const ch of pw) if (this.ALLOWED.includes(ch)) special = true;
    const combo = this.classCount(pw);
    const checks = [
      { label: "8~16자", met: pw.length >= 8 && pw.length <= 16 },
      { label: "영문 포함", met: letter },
      { label: "숫자 포함", met: digit },
      { label: "특수문자 포함", met: special },
      { label: "2종 이상 조합 충족", met: combo >= 2 },
    ].map(c => ({ label: c.label, met: c.met, unmet: !c.met, color: c.met ? "#5FBE2E" : "#9296AC" }));

    const idErr = this.idError(st.userId);
    const emailErr = this.emailError(st.email);
    const phoneErr = this.phoneError(st.phone);
    const pwErr = st.spaceError ? "비밀번호에 공백을 사용할 수 없습니다." : this.pwPriorityError(pw);
    const pwOk = this.pwValid(pw);

    const canSubmit = pwOk; // 아이디/이메일/휴대전화번호 항목 숨김 처리로 비밀번호 조건만 검사
    const submitStyle = {
      marginTop: 30, height: 52, borderRadius: 12, border: "none", width: "100%",
      fontFamily: "inherit", fontSize: 16.5, fontWeight: 600,
      transition: "background 150ms cubic-bezier(.2,.8,.2,1)",
      background: canSubmit ? "#9FE870" : "rgba(159,232,112,0.3)",
      color: canSubmit ? "#163300" : "rgba(22,51,0,0.35)",
      cursor: canSubmit ? "pointer" : "default",
    };

    return {
      userId: st.userId, email: st.email, phone: st.phone, pw,
      pwRef: this.pwRef,
      pwType: st.showPw ? "text" : "password",
      showPw: !st.showPw, hidePw: st.showPw, // 아이콘: 가림=눈 감김(슬래시), 보임=눈 뜸
      onUserId: (e) => this.setState({ userId: e.target.value }),
      onEmail: (e) => this.setState({ email: e.target.value }),
      onPhone: (e) => this.setState({ phone: e.target.value.replace(/[^0-9]/g, "") }),
      onPw: (e) => { const raw = e.target.value; this.setState({ pw: this.sanitize(raw) }); this.flagSpace(raw); },
      onIdBlur: () => this.setState({ idTouched: true }),
      onEmailBlur: () => this.setState({ emailTouched: true }),
      onPhoneBlur: () => this.setState({ phoneTouched: true }),
      onPwFocus: () => this.setState({ pwFocused: true }),
      onPwBlur: () => { this.setState({ pwFocused: false, pwTouched: true }); if (!this.pwValid(this.state.pw) && this.state.pw !== "") this.shakePw(); },
      togglePw: () => this.setState(s => ({ showPw: !s.showPw })),
      onSubmit: this.onSubmit,

      idFieldStyle: this.fieldStyle(this.border(st.idTouched, idErr, false, st.userId.trim() !== "" && !idErr)),
      emailFieldStyle: this.fieldStyle(this.border(st.emailTouched, emailErr, false, st.email.trim() !== "" && !emailErr)),
      phoneFieldStyle: this.fieldStyle(this.border(st.phoneTouched, phoneErr, false, st.phone.trim() !== "" && !phoneErr)),
      pwFieldStyle: this.fieldStyle(this.border(st.pwTouched, (!pwOk && pw !== ""), st.pwFocused, pwOk)),
      pwWrapClass: st.pwShake ? "ph-shake" : "",

      showIdError: st.idTouched && !!idErr,
      idErrorMsg: idErr,
      showEmailError: st.emailTouched && !!emailErr,
      emailErrorMsg: emailErr,
      showPhoneError: st.phoneTouched && !!phoneErr,
      phoneErrorMsg: phoneErr,

      pwEmpty: pw === "",
      pwTyping: pw !== "",
      checks,
      showPwError: st.spaceError || (st.pwTouched && !!this.pwPriorityError(pw) && !pwOk),
      pwErrorMsg: pwErr,
      submitStyle,
    };
  }
}
</script>
</body>
</html>
